      content:
        application/json:
          schema:
            type: object
            title: FileUploadFinalizeResponse
            description: Asynchronous job id used to call the status endpoint.
            properties:
              jobId:
                type: string
                description: The asynchronous job id
                example: 123e4567-e89b-12d3-a456-426614174000
          examples:
            uploadFinalizeResponse:
              value:
                jobId: 85f7c90a-a252-4e82-8cf3-3c989829cdf9
  requestBodies:
    projectCreateRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: ProjectCreateRequest
            description: Represents a request body for creating a project.
            nullable: false
            required:
              - name
            properties:
              name:
                $ref: "#/components/schemas/assetName"
              options:
                $ref: "#/components/schemas/operationOptions"
    projectRenameRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: ProjectRenameRequest
            description: Represents a request body for renaming a project.
            nullable: false
            required:
              - name
            properties:
              name:
                $ref: "#/components/schemas/assetName"
              options:
                $ref: "#/components/schemas/operationOptions"
    patchAssetRoles:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/patchAssetRolesRequest"
          examples:
            patchPermissions:
              $ref: "#/components/examples/patchAssetRoles"
    folderCreateRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FolderCreateRequest
            description: |
              Represents a request body for creating a folder.  

              ---
              > NOTE:  
              > The client must supply either 
              > * a `name` (for single folder creation), or
              > * a `path` (for hierarchy creation) 
              >depending on the type of folder creation requested.
              ---
            nullable: false
            required:
              - parentId
            properties:
              parentId:
                allOf:
                  - $ref: "#/components/schemas/assetId"
                description: Asset Id of the parent container (project/folder).
              name:
                $ref: "#/components/schemas/assetName"
              path:
                $ref: "#/components/schemas/path"
              options:
                $ref: "#/components/schemas/operationOptions"
          examples:
            Single Folder Create Request:
              value:
                name: Marketing
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
            Multiple Folders Create Request:
              value:
                path: Marketing/2024/CampaignA
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
    folderRenameRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FolderRenameRequest
            description: |
              Represents a request body for renaming a folder.
            nullable: false
            properties:
              name:
                $ref: "#/components/schemas/assetName"
              options:
                $ref: "#/components/schemas/operationOptions"
            required:
              - name
    fileRenameRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FileRenameRequest
            description: |
              Represents a request body for renaming a file.
            nullable: false
            properties:
              name:
                $ref: "#/components/schemas/assetName"
              options:
                $ref: "#/components/schemas/operationOptions"
            required:
              - name
    fileCopyRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/copyRequest"
          examples:
            Copy Request With New Name:
              value:
                name: Renamed File.png
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
            Copy Request With Original Name:
              value:
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
            Copy Request with autorename:
              value:
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
                options:
                  autorename: true
    fileMoveRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/moveRequest"
          examples:
            Move Request With New Name:
              value:
                name: Renamed File.png
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
            Move Request With Original Name:
              value:
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
            Move Request with autorename:
              value:
                parentId: urn:aaid:sc:US:f860f2fc-7942-4e49-ab37-5e2b32afe97a
                options:
                  autorename: true
    fileUploadInitRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FileUploadInitRequest
            description: |
              This request body is used to initialize a block based file upload job.
            properties:
              size:
                $ref: "#/components/schemas/fileSize"
              parentId:
                allOf:
                  - $ref: "#/components/schemas/assetId"
                description: Asset Id of the parent container (project/folder).
              name:
                $ref: "#/components/schemas/assetName"
              mediaType:
                type: string
                description: The MIME type of the file
                example: image/jpeg
              blockSize:
                type: integer
                description: The size of each block in bytes. The block size returned may differ from the size requested.
                example: 1048576
              options:
                $ref: "#/components/schemas/operationOptions"
            required:
              - size
              - parentId
              - name
              - mediaType
    fileUploadFinalizeRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FileUploadFinalizeRequest
            description: |
              This request body is used to finalize a block based file upload job.
            properties:
              uploadId:
                type: string
                description: The upload id
                example: 123e4567-e89b-12d3-a456-426614174000
              usedTransferLinks:
                type: array
                description: The transfer links used to upload the file
                items:
                  type: number
                  description: The part number of the blocks used for uploading the content
                minItems: 1
            required:
              - uploadId
              - usedTransferLinks
          example:
            uploadId: 123e4567-e89b-12d3-a456-426614174000
            usedTransferLinks:
              - 1
              - 3
              - 5
    fileReplaceInitRequest:
      required: true
      content:
        application/json:
          schema:
            type: object
            title: FileReplacementUploadInitRequest
            description: |
              This request body is used to initialize a block based file replacement upload job.
            properties:
              size:
                $ref: "#/components/schemas/fileSize"
              mediaType:
                type: string
                description: The MIME type of the file
                example: image/jpeg
              blockSize:
                type: integer
                description: The size of each block in bytes. The block size returned may differ from the size requested.
                example: 1048576
              options:
                $ref: "#/components/schemas/operationOptions"
            required:
              - size
              - mediaType
