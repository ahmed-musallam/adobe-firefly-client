                  type: group
                  error_code: ec
                  message: Failed
                  role: edit
                - status: successful
                  id: A495C2C08D81E3B665BE5640B@e
                  type: user
                  role: comment
                - status: failed
                  id: orgEverybody
                  type: predefined
                  error_code: ec
                  message: Failed
                  role: edit
              updates:
                - status: failed
                  id: 08D81E3B665BE5640A495C2C@AdobeOrg
                  type: group
                  error_code: ec
                  message: Failed
                  role: edit
                - status: successful
                  id: orgEverybody
                  type: predefined
                  role: comment
              deletions:
                - status: successful
                  id: A495C2C08D81E3B665BE5640@e
                  type: user
